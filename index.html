<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BERA Protocolo">
<meta name="description" content="Protocolo profissional de passagem de som ao vivo — BERA Escola de Áudio Profissional">
<title>BERA — Protocolo ao Vivo</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230b0c0f'/><text y='68' x='50' text-anchor='middle' font-size='42' font-family='monospace' font-weight='700' fill='%23f5a623'>B</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0b0c0f;
  --bg1:     #0e1015;
  --sur:     #111318;
  --card:    #161a22;
  --card2:   #1c2130;
  --bdr:     #252b38;
  --bdr2:    #2e3850;
  --amber:   #f5a623;
  --amber2:  #ffcc6b;
  --amber-d: #7a4e00;
  --green:   #39e07a;
  --green-d: #0d4020;
  --red:     #ff4757;
  --red-d:   #4a0810;
  --blue:    #3b8bd4;
  --cyan:    #00d4ff;
  --muted:   #8a96b0;
  --text:    #d8e0f0;
  --text2:   #a0acc8;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans', sans-serif;
  --disp:    'Bebas Neue', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── LAYOUT ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
}

/* ── HEADER ── */
header {
  background: var(--bg1);
  border-bottom: 1px solid var(--bdr);
  padding: calc(var(--safe-top) + 12px) 16px 0;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.brand-name {
  font-family: var(--disp);
  font-size: 26px;
  letter-spacing: 0.06em;
  color: var(--amber);
  line-height: 1;
}

.brand-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
}

.header-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.progress-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.progress-count {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--amber);
}

/* Global progress bar */
.global-progress {
  height: 2px;
  background: var(--bdr);
  position: relative;
  overflow: hidden;
  margin-bottom: 0;
}

.global-progress-fill {
  height: 100%;
  background: var(--amber);
  transition: width 0.4s ease;
}

/* Phase tabs */
.phase-tabs {
  display: flex;
  gap: 2px;
  padding: 8px 0 0;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.phase-tabs::-webkit-scrollbar { display: none; }

.phase-tab {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 12px 8px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  position: relative;
}

.phase-tab.done .tab-num { color: var(--green); }
.phase-tab.done .tab-label { color: var(--green); opacity: 0.7; }
.phase-tab.done { border-bottom-color: var(--green-d); }

.phase-tab.active .tab-num { color: var(--amber); }
.phase-tab.active .tab-label { color: var(--amber); }
.phase-tab.active { border-bottom-color: var(--amber); }

.tab-num {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.tab-label {
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  letter-spacing: 0.01em;
}

/* ── MAIN CONTENT ── */
main {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  scroll-behavior: smooth;
}

/* ── PHASE SECTION ── */
.phase-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.phase-info { flex: 1; }

.phase-num-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}

.phase-title {
  font-family: var(--disp);
  font-size: 22px;
  letter-spacing: 0.04em;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 4px;
}

.phase-module {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--amber);
  letter-spacing: 0.06em;
}

/* Timer */
.phase-timer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.timer-display {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: 0.04em;
  min-width: 64px;
  text-align: center;
}

.timer-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.08em;
}

.timer-btn {
  background: none;
  border: 1px solid var(--bdr2);
  border-radius: 4px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.15s;
}

.timer-btn:hover, .timer-btn:active { border-color: var(--amber); color: var(--amber); }
.timer-btn.running { border-color: var(--red); color: var(--red); }

/* Phase progress mini */
.phase-progress-bar {
  height: 3px;
  background: var(--bdr);
  margin: 0 16px 0;
}

.phase-progress-fill {
  height: 100%;
  background: var(--amber);
  transition: width 0.4s ease;
}

/* ── STEPS ── */
.steps-list {
  padding: 8px 0 80px;
}

.step-item {
  border-bottom: 1px solid var(--bdr);
  transition: background 0.15s;
}

.step-head {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  position: relative;
}

.step-head:active { background: rgba(255,255,255,0.02); }

.step-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--bdr2);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-top: 1px;
  cursor: pointer;
}

.step-check.done {
  background: var(--amber);
  border-color: var(--amber);
}

.step-check.done::after {
  content: '';
  width: 10px;
  height: 6px;
  border-left: 2px solid #000;
  border-bottom: 2px solid #000;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

.step-body-wrap { flex: 1; min-width: 0; }

.step-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}

.step-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
  padding-right: 8px;
}

.step-item.done .step-title { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--bdr2); }

.step-brief {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  line-height: 1.4;
}

.step-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
}

.crit {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.06em;
  white-space: nowrap;
}

.crit-a { background: rgba(255,71,87,0.15); color: var(--red); border: 1px solid rgba(255,71,87,0.25); }
.crit-b { background: rgba(245,166,35,0.12); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }
.crit-c { background: rgba(57,224,122,0.1); color: var(--green); border: 1px solid rgba(57,224,122,0.2); }

.chevron {
  color: var(--muted);
  font-size: 14px;
  transition: transform 0.2s;
  margin-top: 2px;
  line-height: 1;
}

.step-item.open .chevron { transform: rotate(180deg); }

/* Step detail panel */
.step-detail {
  display: none;
  padding: 0 16px 16px 50px;
}

.step-item.open .step-detail { display: block; }

.detail-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 10px;
}

.detail-text strong {
  color: var(--text);
  font-weight: 500;
}

.detail-text em {
  color: var(--amber2);
  font-style: normal;
  font-family: var(--mono);
  font-size: 12px;
}

.warn-box {
  background: rgba(255,71,87,0.1);
  border: 1px solid rgba(255,71,87,0.2);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: #ff8090;
  line-height: 1.55;
  margin-bottom: 10px;
}

.warn-box::before {
  content: '⚠ ';
  font-size: 11px;
}

.info-box {
  background: rgba(59,139,212,0.1);
  border: 1px solid rgba(59,139,212,0.2);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: #7ab8f0;
  line-height: 1.55;
  margin-bottom: 10px;
}

.info-box::before {
  content: '› ';
  font-family: var(--mono);
  font-size: 11px;
  opacity: 0.7;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}

.tag {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  background: var(--card2);
  border-radius: 3px;
  color: var(--muted);
  border: 1px solid var(--bdr);
}

/* RF Tool callout */
.rf-callout {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: rgba(0,212,255,0.07);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 10px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s;
}

.rf-callout:active { background: rgba(0,212,255,0.12); }

.rf-icon {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  background: #0b0c0f;
  border: 1px solid rgba(0,212,255,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 700;
  color: #00d4ff;
  letter-spacing: 0.05em;
  line-height: 1.2;
  text-align: center;
}

.rf-content { flex: 1; }

.rf-label {
  font-family: var(--mono);
  font-size: 9px;
  color: rgba(0,212,255,0.7);
  letter-spacing: 0.08em;
  margin-bottom: 2px;
}

.rf-title {
  font-size: 13px;
  font-weight: 500;
  color: #7ee8ff;
  margin-bottom: 2px;
}

.rf-desc {
  font-size: 11px;
  color: rgba(0,212,255,0.6);
  line-height: 1.4;
}

.rf-arrow {
  color: rgba(0,212,255,0.5);
  font-size: 16px;
  align-self: center;
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--bg1);
  border-top: 1px solid var(--bdr);
  padding: 10px 16px calc(var(--safe-bot) + 10px);
  display: flex;
  gap: 8px;
  z-index: 20;
}

.btn-prev, .btn-next {
  flex: 1;
  padding: 12px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  border: 1px solid var(--bdr2);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-prev {
  background: transparent;
  color: var(--muted);
}

.btn-prev:active { background: var(--sur); }

.btn-next {
  background: var(--amber);
  color: #000;
  border-color: var(--amber);
  flex: 2;
}

.btn-next:active { background: var(--amber2); }
.btn-next:disabled { background: var(--bdr); color: var(--muted); border-color: var(--bdr); cursor: default; }

/* ── COMPLETE SCREEN ── */
.complete-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px 24px;
  text-align: center;
}

.complete-screen.show { display: flex; }

.complete-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: rgba(57,224,122,0.15);
  border: 2px solid var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}

.complete-icon::after {
  content: '';
  width: 28px;
  height: 18px;
  border-left: 3px solid var(--green);
  border-bottom: 3px solid var(--green);
  transform: rotate(-45deg) translateY(-3px);
  display: block;
}

.complete-title {
  font-family: var(--disp);
  font-size: 36px;
  letter-spacing: 0.06em;
  color: var(--green);
  margin-bottom: 8px;
}

.complete-sub {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 32px;
  max-width: 280px;
}

.btn-reset {
  background: transparent;
  border: 1px solid var(--bdr2);
  border-radius: 6px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px 24px;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.15s;
}

.btn-reset:active { border-color: var(--amber); color: var(--amber); }

/* ── INSTALL PROMPT ── */
.install-banner {
  display: none;
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 448px;
  background: var(--card2);
  border: 1px solid var(--bdr2);
  border-radius: 10px;
  padding: 12px 14px;
  z-index: 30;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.install-banner.show { display: flex; }

.install-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.install-logo {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: #0b0c0f;
  border: 1px solid var(--bdr2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--amber);
}

.install-text { flex: 1; }
.install-title { font-size: 13px; font-weight: 500; color: var(--text); }
.install-sub { font-size: 11px; color: var(--muted); }

.install-actions { display: flex; gap: 8px; }

.btn-install {
  flex: 1;
  background: var(--amber);
  color: #000;
  border: none;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 8px;
  cursor: pointer;
  letter-spacing: 0.05em;
}

.btn-dismiss {
  background: transparent;
  border: 1px solid var(--bdr2);
  border-radius: 6px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 12px;
  cursor: pointer;
}

/* ── SPLASH ── */
.splash {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.4s ease;
}

.splash.hide { opacity: 0; pointer-events: none; }

.splash-logo {
  font-family: var(--disp);
  font-size: 56px;
  letter-spacing: 0.1em;
  color: var(--amber);
  margin-bottom: 6px;
}

.splash-tagline {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.14em;
  margin-bottom: 40px;
}

.splash-loader {
  width: 120px;
  height: 2px;
  background: var(--bdr);
  border-radius: 99px;
  overflow: hidden;
}

.splash-loader-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 99px;
  animation: load 1.2s ease forwards;
}

@keyframes load {
  from { width: 0; }
  to   { width: 100%; }
}

/* ── MISC ── */
.badge-done {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  background: rgba(57,224,122,0.1);
  color: var(--green);
  border: 1px solid rgba(57,224,122,0.2);
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

/* Fade in steps */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.step-item {
  animation: fadeUp 0.25s ease both;
}

.step-item:nth-child(1) { animation-delay: 0.03s; }
.step-item:nth-child(2) { animation-delay: 0.06s; }
.step-item:nth-child(3) { animation-delay: 0.09s; }
.step-item:nth-child(4) { animation-delay: 0.12s; }
.step-item:nth-child(5) { animation-delay: 0.15s; }
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-logo">BERA</div>
  <div class="splash-tagline">PROTOCOLO AO VIVO</div>
  <div class="splash-loader"><div class="splash-loader-fill"></div></div>
</div>

<!-- INSTALL BANNER -->
<div class="install-banner" id="installBanner">
  <div class="install-top">
    <div class="install-logo">BERA</div>
    <div class="install-text">
      <div class="install-title">Instalar na tela inicial</div>
      <div class="install-sub">Acesso rápido · Funciona offline</div>
    </div>
  </div>
  <div class="install-actions">
    <button class="btn-install" id="btnInstall">Instalar agora</button>
    <button class="btn-dismiss" id="btnDismiss">Agora não</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="header-top">
      <div class="brand">
        <span class="brand-name">BERA</span>
        <span class="brand-sub">PROTOCOLO AO VIVO</span>
      </div>
      <div class="header-meta">
        <span class="progress-label">CONCLUÍDAS</span>
        <span class="progress-count" id="globalCount">0 / 31</span>
      </div>
    </div>
    <div class="global-progress">
      <div class="global-progress-fill" id="globalBar" style="width:0%"></div>
    </div>
    <div class="phase-tabs" id="phaseTabs"></div>
  </header>

  <!-- CONTENT -->
  <main id="mainContent">

    <!-- PHASE VIEW (shown per phase) -->
    <div id="phaseView">
      <div class="phase-header">
        <div class="phase-info">
          <div class="phase-num-label" id="phaseNumLabel">FASE 01</div>
          <div class="phase-title" id="phaseTitle">Pré-chegada</div>
          <div class="phase-module" id="phaseModule">M01 · M02</div>
        </div>
        <div class="phase-timer">
          <div class="timer-display" id="timerDisplay">00:00</div>
          <div class="timer-label">FASE</div>
          <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">INICIAR</button>
        </div>
      </div>

      <div class="phase-progress-bar">

// Load from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('bera_done');
    if (saved) done = JSON.parse(saved);
    const savedTimers = localStorage.getItem('bera_timers');
    if (savedTimers) phaseTimers = JSON.parse(savedTimers);
    const savedPhase = localStorage.getItem('bera_phase');
    if (savedPhase !== null) currentPhase = parseInt(savedPhase);
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('bera_done', JSON.stringify(done));
    localStorage.setItem('bera_timers', JSON.stringify(phaseTimers));
    localStorage.setItem('bera_phase', currentPhase);
  } catch(e) {}
}

// ─────────────────────────────────────────────
//  TOTAL STEPS
// ─────────────────────────────────────────────
function totalSteps() {
  return PHASES.reduce((s, p) => s + p.steps.length, 0);
}

function totalDone() {
  return Object.values(done).filter(Boolean).length;
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderTabs() {
  const container = document.getElementById('phaseTabs');
  const phaseDone = PHASES.map(p => p.steps.every(s => done[s.id]));
  container.innerHTML = PHASES.map((p, i) => `
    <div class="phase-tab ${i === currentPhase ? 'active' : ''} ${phaseDone[i] ? 'done' : ''}"
         onclick="goToPhase(${i})">
      <span class="tab-num">${phaseDone[i] ? '✓' : p.num}</span>
      <span class="tab-label">${p.title}</span>
    </div>
  `).join('');
}

function renderPhase() {
  const phase = PHASES[currentPhase];
  document.getElementById('phaseNumLabel').textContent = `FASE ${phase.num}`;
  document.getElementById('phaseTitle').textContent = phase.title;
  document.getElementById('phaseModule').textContent = phase.module;

  const stepsEl = document.getElementById('stepsList');
  stepsEl.innerHTML = phase.steps.map(step => renderStep(step)).join('');

  updatePhaseProgress();
  updateGlobalProgress();
  updateTimer();
  updateNavBtns();
  renderTabs();
  scrollToTop();
}

function renderStep(step) {
  const isDone = done[step.id];
  const critClass = `crit-${step.crit}`;
  const detailHtml = buildDetail(step);

  return `<div class="step-item ${isDone ? 'done' : ''}" id="item_${step.id}">
    <div class="step-head" onclick="toggleStep('${step.id}')">
      <div class="step-check ${isDone ? 'done' : ''}" onclick="event.stopPropagation(); toggleDone('${step.id}')"></div>
      <div class="step-body-wrap">
        <div class="step-num">ETAPA ${step.n}</div>
        <div class="step-title">${step.title}</div>
        ${step.brief ? `<div class="step-brief">${step.brief}</div>` : ''}
      </div>
      <div class="step-right">
        <span class="crit ${critClass}">${step.critLabel}</span>
        <span class="chevron">▾</span>
      </div>
    </div>
    <div class="step-detail">${detailHtml}</div>
  </div>`;
}

function buildDetail(step) {
  let html = '';
  if (step.warn) html += `<div class="warn-box">${step.warn}</div>`;
  html += `<div class="detail-text">${step.detail}</div>`;
  if (step.info) html += `<div class="info-box">${step.info}</div>`;
  if (step.rf) {
    html += `<a class="rf-callout" href="coordenador-rf.html" target="_blank">
      <div class="rf-icon">COORD<br>RF</div>
      <div class="rf-content">
        <div class="rf-label">FERRAMENTA BERA — EXTRAS</div>
        <div class="rf-title">Coordenador RF + TinySA</div>
        <div class="rf-desc">Offline · Calcula IM3 · Até 16 canais simultâneos · Visualização espectral</div>
      </div>
      <span class="rf-arrow">›</span>
    </a>`;
  }
  if (step.tags && step.tags.length) {
    html += `<div class="tags">${step.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
  }
  return html;
}

// ─────────────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────────────
function toggleStep(id) {
  const item = document.getElementById(`item_${id}`);
  item.classList.toggle('open');
}

function toggleDone(id) {
  done[id] = !done[id];
  saveState();
  const item = document.getElementById(`item_${id}`);
  const check = item.querySelector('.step-check');
  if (done[id]) {
    item.classList.add('done');
    check.classList.add('done');
    // Close if open
    item.classList.remove('open');
  } else {
    item.classList.remove('done');
    check.classList.remove('done');
  }
  updatePhaseProgress();
  updateGlobalProgress();
  renderTabs();
  checkAllDone();
}

function updatePhaseProgress() {
  const phase = PHASES[currentPhase];
  const total = phase.steps.length;
  const doneCount = phase.steps.filter(s => done[s.id]).length;
  const pct = total > 0 ? (doneCount / total) * 100 : 0;
  document.getElementById('phaseBar').style.width = pct + '%';
}

function updateGlobalProgress() {
  const total = totalSteps();
  const doneCount = totalDone();
  const pct = total > 0 ? (doneCount / total) * 100 : 0;
  document.getElementById('globalBar').style.width = pct + '%';
  document.getElementById('globalCount').textContent = `${doneCount} / ${total}`;
}

function checkAllDone() {
  if (totalDone() === totalSteps()) {
    setTimeout(() => {
      document.getElementById('phaseView').style.display = 'none';
      document.getElementById('bottomBar').style.display = 'none';
      document.getElementById('completeScreen').classList.add('show');
    }, 400);
  }
}

function goToPhase(i) {
  stopTimer();
  currentPhase = i;
  saveState();
  document.getElementById('phaseView').style.display = 'block';
  document.getElementById('completeScreen').classList.remove('show');
  document.getElementById('bottomBar').style.display = 'flex';
  renderPhase();
}

function prevPhase() {
  if (currentPhase > 0) goToPhase(currentPhase - 1);
}

function nextPhase() {
  if (currentPhase < PHASES.length - 1) goToPhase(currentPhase + 1);
}

function updateNavBtns() {
  document.getElementById('btnPrev').style.display = currentPhase === 0 ? 'none' : '';
  const next = document.getElementById('btnNext');
  if (currentPhase === PHASES.length - 1) {
    next.textContent = 'SHOW PRONTO ✓';
    next.disabled = totalDone() < totalSteps();
  } else {
    next.textContent = 'PRÓXIMA FASE →';
    next.disabled = false;
  }
}

function scrollToTop() {
  document.getElementById('mainContent').scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  done = {};
  phaseTimers = {};
  currentPhase = 0;
  timerSeconds = 0;
  saveState();
  document.getElementById('phaseView').style.display = 'block';
  document.getElementById('completeScreen').classList.remove('show');
  document.getElementById('bottomBar').style.display = 'flex';
  renderPhase();
}

// ─────────────────────────────────────────────
//  TIMER
// ─────────────────────────────────────────────
function updateTimer() {
  timerSeconds = phaseTimers[currentPhase] || 0;
  timerRunning = false;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  renderTimer();
}

function renderTimer() {
  const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
  const s = (timerSeconds % 60).toString().padStart(2, '0');
  document.getElementById('timerDisplay').textContent = `${m}:${s}`;
  const btn = document.getElementById('timerBtn');
  if (timerRunning) {
    btn.textContent = 'PAUSAR';
    btn.classList.add('running');
  } else {
    btn.textContent = timerSeconds > 0 ? 'CONTINUAR' : 'INICIAR';
    btn.classList.remove('running');
  }
}

function toggleTimer() {
  if (timerRunning) {
    timerRunning = false;
    clearInterval(timerInterval);
    timerInterval = null;
  } else {
    timerRunning = true;
    timerInterval = setInterval(() => {
      timerSeconds++;
      phaseTimers[currentPhase] = timerSeconds;
      renderTimer();
    }, 1000);
  }
  renderTimer();
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerRunning = false;
  if (phaseTimers[currentPhase] !== undefined) {
    phaseTimers[currentPhase] = timerSeconds;
  }
}

// ─────────────────────────────────────────────
//  PWA INSTALL
// ─────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const shown = localStorage.getItem('bera_install_dismissed');
  if (!shown) {
    setTimeout(() => {
      document.getElementById('installBanner').classList.add('show');
    }, 3000);
  }
});

document.getElementById('btnInstall').addEventListener('click', () => {
  document.getElementById('installBanner').classList.remove('show');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r => {
      deferredPrompt = null;
    });
  }
});

document.getElementById('btnDismiss').addEventListener('click', () => {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('bera_install_dismissed', '1');
});

// ─────────────────────────────────────────────
//  SERVICE WORKER
// ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
loadState();
renderPhase();
updateGlobalProgress();

setTimeout(() => {
  document.getElementById('splash').classList.add('hide');
  setTimeout(() => {
    document.getElementById('splash').remove();
  }, 500);
}, 1400);
</script>
</body>
</html>
